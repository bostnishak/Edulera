<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sign In — Edulera</title>
    <meta name="description" content="Sign in to your Edulera account.">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="js/theme.js"></script>
    <style>
        .role-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            padding: 6px;
        }

        .role-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.25s;
        }

        .role-tab i {
            font-size: 1.2rem;
        }

        .role-tab.active {
            background: var(--bg-secondary);
            color: var(--accent-500);
            box-shadow: var(--shadow-md);
        }

        .role-tab:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .role-tab.tab-admin.active {
            color: #ef4444;
        }

        .role-tab.tab-corporate.active {
            color: #0d9488;
        }

        .role-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-badge.user {
            background: var(--accent-soft);
            color: var(--accent-500);
        }

        .role-badge.corporate {
            background: var(--success-soft);
            color: var(--success);
        }

        .role-badge.admin {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .demo-hint {
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            border-left: 3px solid var(--accent-500);
            display: none;
        }

        .demo-hint.show {
            display: block;
        }

        .demo-hint strong {
            color: var(--text-primary);
        }

        .demo-hint.green {
            border-left-color: var(--success);
        }

        .demo-hint.red {
            border-left-color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="auth-bg"></div>
    <div style="position:fixed;top:16px;right:16px;z-index:100">
        <button class="theme-toggle" data-theme-toggle title="Toggle theme"><span
                class="theme-toggle-icon">🌙</span></button>
    </div>
    <div class="auth-page">
        <div class="auth-card animate-fadeInUp">
            <a href="index.html" class="auth-logo">
                <div class="auth-logo-icon">E</div>
                <span class="auth-logo-text">Edu<span>lera</span></span>
            </a>
            <h1 class="auth-title" id="login-title">Welcome Back!</h1>
            <p class="auth-subtitle" id="login-subtitle">Sign in to your account and continue learning.</p>

            <!-- Role Tabs -->
            <div class="role-tabs" id="role-tabs">
                <button class="role-tab tab-user active" data-role="user">
                    <i class="fas fa-user"></i>
                    User
                </button>
                <button class="role-tab tab-corporate" data-role="corporate">
                    <i class="fas fa-building"></i>
                    Corporate
                </button>
                <button class="role-tab tab-admin" data-role="admin">
                    <i class="fas fa-shield-alt"></i>
                    Admin
                </button>
            </div>

            <!-- Demo hints -->
            <div class="demo-hint green" id="hint-corporate">
                <strong>Demo Corporate:</strong> company@techcorp.com / Company123!
            </div>
            <div class="demo-hint red" id="hint-admin">
                <strong>Demo Admin:</strong> admin@Edulera.com / Admin123!
            </div>

            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input class="form-input" type="email" id="email" placeholder="example@email.com"
                            autocomplete="email">
                    </div>
                    <span class="form-error" id="email-err">Please enter a valid email address.</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input class="form-input" type="password" id="password" placeholder="Your password"
                            autocomplete="current-password">
                    </div>
                    <span class="form-error" id="pw-err">Password cannot be empty.</span>
                </div>
                <label class="form-check">
                    <input type="checkbox" id="remember"><span class="form-check-label">Remember me</span>
                </label>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <div id="login-error" class="hidden"
                    style="background:var(--danger-soft);color:var(--danger);padding:12px 16px;border-radius:var(--radius-md);font-size:.875rem;text-align:center">
                </div>
            </form>
            <p class="auth-footer" id="auth-footer-links">Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (LHAuth.getCurrentUser()) {
                const u = LHAuth.getCurrentUser();
                if (u.role === 'admin') location.href = 'admin.html';
                else if (u.role === 'corporate') location.href = 'corporate.html';
                else location.href = 'index.html';
                return;
            }

            let selectedRole = 'user';

            const titles = {
                user: { title: 'Welcome Back!', subtitle: 'Sign in to your account and continue learning.' },
                corporate: { title: 'Corporate Sign In', subtitle: 'Access content management with your corporate account.' },
                admin: { title: 'Admin Sign In', subtitle: 'Sign in to the admin panel securely.' }
            };

            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedRole = tab.dataset.role;
                    const t = titles[selectedRole];
                    document.getElementById('login-title').textContent = t.title;
                    document.getElementById('login-subtitle').textContent = t.subtitle;
                    // Show/hide demo hints
                    document.getElementById('hint-corporate').classList.toggle('show', selectedRole === 'corporate');
                    document.getElementById('hint-admin').classList.toggle('show', selectedRole === 'admin');
                    // Footer links: only for user
                    document.getElementById('auth-footer-links').style.display = selectedRole === 'user' ? '' : 'none';
                });
            });

            const form = document.getElementById('login-form');
            form.addEventListener('submit', e => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const pw = document.getElementById('password').value;
                const errEl = document.getElementById('login-error');
                const btn = document.getElementById('login-btn');
                if (!email) { document.getElementById('email-err').classList.add('show'); return; }
                document.getElementById('email-err').classList.remove('show');
                if (!pw) { document.getElementById('pw-err').classList.add('show'); return; }
                document.getElementById('pw-err').classList.remove('show');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                setTimeout(() => {
                    const res = LHAuth.login(email, pw, selectedRole);
                    if (res.ok) {
                        LHData.toast('Welcome! Redirecting...', 'success');
                        setTimeout(() => {
                            if (selectedRole === 'admin') location.href = 'admin.html';
                            else if (selectedRole === 'corporate') location.href = 'corporate.html';
                            else {
                                const redirect = new URLSearchParams(location.search).get('redirect');
                                location.href = redirect || 'index.html';
                            }
                        }, 900);
                    } else {
                        errEl.textContent = res.msg; errEl.classList.remove('hidden');
                        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    }
                }, 800);
            });
        });
    </script>
</body>

</html>
