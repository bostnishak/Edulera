<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Lesson Player — Edulera</title>
    <meta name="description" content="Edulera course player — follow lessons and track your progress.">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="js/theme.js"></script>
    <style>
        .player-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: calc(100vh - 64px);
        }

        .player-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            height: calc(100vh - 64px);
            position: sticky;
            top: 64px;
        }

        .player-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .player-sidebar-title {
            font-weight: 700;
            font-size: .95rem;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .lesson-list {
            padding: 8px 0;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background .2s;
            border-left: 3px solid transparent;
        }

        .lesson-item:hover {
            background: var(--bg-card);
        }

        .lesson-item.active {
            background: var(--accent-soft);
            border-left-color: var(--accent);
        }

        .lesson-item.completed .lesson-num {
            background: var(--success);
            color: #fff;
        }

        .lesson-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            font-weight: 700;
            flex-shrink: 0;
            transition: all .3s;
            color: var(--text-muted);
        }

        .lesson-item.active .lesson-num {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .lesson-info {
            flex: 1;
            min-width: 0;
        }

        .lesson-name {
            font-size: .88rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lesson-duration {
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .player-main {
            padding: 0;
            overflow-y: auto;
        }

        .video-area {
            background: #000;
            position: relative;
            aspect-ratio: 16/9;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            text-align: center;
            color: #fff;
        }

        .video-play-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .2);
            border: 3px solid rgba(255, 255, 255, .6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 16px;
            cursor: pointer;
            transition: all .3s;
            backdrop-filter: blur(8px);
        }

        .video-play-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .player-content {
            padding: 32px 40px;
        }

        .player-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: .85rem;
            margin-bottom: 20px;
        }

        .player-lesson-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .player-lesson-desc {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .player-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            align-items: center;
        }

        .progress-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .player-layout {
                grid-template-columns: 1fr;
            }

            .player-sidebar {
                height: auto;
                position: static;
            }

            .player-content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar" style="position:sticky;top:0;z-index:100">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-logo">
                <div class="navbar-logo-icon">E</div><span class="navbar-logo-text">Edu<span>lera</span></span>
            </a>
            <div id="player-course-name"
                style="font-weight:600;font-size:.9rem;color:var(--text-secondary);flex:1;padding:0 20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            </div>
            <div class="navbar-actions">
                <button class="theme-toggle" data-theme-toggle title="Toggle theme"><span
                        class="theme-toggle-icon">🌙</span></button>
                <div id="nav-guest" class="flex gap-2">
                    <a href="login.html" class="btn btn-ghost btn-sm">Sign In</a>
                </div>
                <div id="nav-user" class="hidden relative">
                    <div class="navbar-avatar" id="nav-avatar-wrap"><span id="nav-avatar-text">U</span></div>
                    <div class="navbar-dropdown" id="nav-dropdown">
                        <a href="profile.html"><i class="fas fa-user"></i> My Profile</a>
                        <hr>
                        <button id="nav-logout"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="player-layout">
        <!-- SIDEBAR -->
        <aside class="player-sidebar">
            <div class="player-sidebar-header">
                <div class="player-sidebar-title" id="sidebar-course-title">Course Content</div>
                <!-- Progress bar -->
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                    <div style="flex:1;height:6px;background:var(--bg-card);border-radius:99px;overflow:hidden">
                        <div id="sidebar-progress-bar"
                            style="height:100%;background:var(--accent);border-radius:99px;transition:width .4s;width:0%"></div>
                    </div>
                    <span id="sidebar-progress-text"
                        style="font-size:.78rem;color:var(--text-muted);white-space:nowrap">0/0</span>
                </div>
                <div id="sidebar-progress-pct" style="font-size:.8rem;font-weight:600;color:var(--accent)">0% Completed
                </div>
            </div>
            <div class="lesson-list" id="lesson-list"></div>
            <!-- Quiz / Cert buttons at bottom -->
            <div style="padding:16px;border-top:1px solid var(--border)">
                <button id="btn-go-quiz" class="btn btn-primary" style="width:100%;margin-bottom:8px;display:none">
                    <i class="fas fa-pencil-alt"></i> Take the Quiz
                </button>
                <button id="btn-part-cert" class="btn btn-outline" style="width:100%;display:none">
                    <i class="fas fa-certificate"></i> Get Participation Certificate
                </button>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="player-main">
            <!-- Video area -->
            <div class="video-area" id="video-area">
                <div class="video-placeholder">
                    <div class="video-play-btn" id="video-play-btn"><i class="fas fa-play"></i></div>
                    <div id="video-title-overlay" style="font-size:1.1rem;font-weight:600;opacity:.9"></div>
                    <div style="font-size:.85rem;opacity:.6;margin-top:6px">Demo Video — <span
                            id="video-duration-overlay"></span></div>
                </div>
                <!-- Fake progress bar -->
                <div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.2)">
                    <div id="video-progress" style="height:100%;background:var(--accent);width:0%;transition:width .1s">
                    </div>
                </div>
            </div>

            <div class="player-content">
                <div class="player-breadcrumb">
                    <a href="catalog.html" style="color:var(--accent)">Courses</a>
                    <i class="fas fa-chevron-right" style="font-size:.65rem"></i>
                    <span id="bc-title">Course</span>
                    <i class="fas fa-chevron-right" style="font-size:.65rem"></i>
                    <span id="bc-lesson">Lesson</span>
                </div>

                <div id="lesson-number-badge" class="badge badge-accent" style="margin-bottom:12px;display:inline-flex">
                </div>
                <h1 class="player-lesson-title" id="lesson-title">Loading lesson...</h1>
                <p class="player-lesson-desc" id="lesson-desc">Loading content...</p>

                <div class="player-actions">
                    <button id="btn-prev" class="btn btn-outline" disabled><i class="fas fa-arrow-left"></i> Previous
                        Lesson</button>
                    <button id="btn-complete" class="btn btn-success"><i class="fas fa-check"></i> Mark as
                        Complete</button>
                    <button id="btn-next" class="btn btn-primary">Next Lesson <i
                            class="fas fa-arrow-right"></i></button>
                </div>

                <!-- Lesson resources -->
                <div class="progress-section">
                    <h3 style="font-size:1rem;margin-bottom:16px"><i class="fas fa-laptop-code"
                            style="color:var(--accent);margin-right:8px"></i>Lesson Resources</h3>
                    <div style="display:grid;gap:10px" id="lesson-resources">
                        <div
                            style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-card);border-radius:var(--radius-md)">
                            <i class="fas fa-file-pdf" style="color:#ef4444;font-size:1.2rem"></i>
                            <div>
                                <div style="font-size:.88rem;font-weight:500">Lesson Notes PDF</div>
                                <div style="font-size:.75rem;color:var(--text-muted)">4.2 MB</div>
                            </div>
                            <button class="btn btn-ghost btn-sm" style="margin-left:auto"><i
                                    class="fas fa-download"></i></button>
                        </div>
                        <div
                            style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-card);border-radius:var(--radius-md)">
                            <i class="fas fa-code" style="color:var(--accent);font-size:1.2rem"></i>
                            <div>
                                <div style="font-size:.88rem;font-weight:500">Source Code</div>
                                <div style="font-size:.75rem;color:var(--text-muted)">GitHub</div>
                            </div>
                            <button class="btn btn-ghost btn-sm" style="margin-left:auto"><i
                                    class="fas fa-external-link-alt"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
</body>

</html>
